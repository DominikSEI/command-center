version: "3.9"

services:
  backend:
    build: ./backend
    container_name: cc_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:///./data/command_center.db
    volumes:
      - backend_data:/app/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: cc_frontend
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: cc_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - internal
    depends_on:
      - backend
      - frontend

volumes:
  backend_data:

networks:
  internal:
    driver: bridge
